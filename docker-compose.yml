services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flashycardycourse-web
    ports:
      - "8080:80"  # host:container
    env_file:
      - .env
      - .env.docker
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    depends_on:
      - db

  db:
    image: postgres:18
    container_name: flashycardycourse-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=flashycardycourse
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - PGDATA=/var/lib/postgresql/18/docker
    ports:
      - "8032:5432"
    volumes:
      - ./.volumes/postgresql:/var/lib/postgresql

